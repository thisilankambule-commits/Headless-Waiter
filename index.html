<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍽️ Headless Waiter</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #f5f5f5; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { color: #2c3e50; text-align: center; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #7f8c8d; margin-bottom: 20px; }
        .menu-item { background: white; border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); display: flex; gap: 15px; align-items: center; }
        .menu-item img { width: 80px; height: 80px; border-radius: 10px; object-fit: cover; }
        .item-info { flex: 1; }
        .item-name { font-weight: bold; font-size: 18px; }
        .item-price { color: #e67e22; font-weight: bold; }
        .modifiers { margin: 5px 0; font-size: 14px; color: #555; }
        .modifiers label { display: inline-block; margin-right: 10px; background: #ecf0f1; padding: 2px 10px; border-radius: 15px; }
        .add-btn { background: #27ae60; color: white; border: none; padding: 8px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .add-btn:hover { background: #219a52; }
        .cart { background: white; padding: 20px; border-radius: 12px; margin-top: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); position: sticky; bottom: 0; }
        .cart h3 { margin-bottom: 10px; }
        .cart-item { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #ecf0f1; }
        .total { font-weight: bold; font-size: 20px; margin: 10px 0; }
        .place-order { background: #e67e22; color: white; border: none; padding: 15px; width: 100%; border-radius: 30px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .place-order:hover { background: #d35400; }
        .status { text-align: center; margin-top: 10px; color: #27ae60; }
        .qr-section { text-align: center; margin: 20px 0; padding: 15px; background: #ecf0f1; border-radius: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍽️ Headless Waiter</h1>
        <p class="subtitle">Scan QR → Order → Pay → Done!</p>

        <!-- QR Code Info (demo) -->
        <div class="qr-section">
            📱 <strong>QR Code Ready!</strong> This page is now live at your GitHub URL
        </div>

        <!-- Menu Items -->
        <div id="menu"></div>

        <!-- Shopping Cart -->
        <div class="cart" id="cart">
            <h3>🛒 Your Order</h3>
            <div id="cart-items"></div>
            <div class="total">Total: $<span id="total">0.00</span></div>
            <button class="place-order" onclick="placeOrder()">📨 Place Order</button>
            <div id="status" class="status"></div>
        </div>
    </div>

    <script>
        // Sample menu data with HD images from Unsplash
        const menuData = [
            { id: 1, name: "Classic Burger", price: 12.99, img: "https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=150", modifiers: ["Extra Cheese (+$1)", "Bacon (+$2)"] },
            { id: 2, name: "Margherita Pizza", price: 14.99, img: "https://images.unsplash.com/photo-1604068549290-dea0e4a305ca?w=150", modifiers: ["Extra Cheese (+$1.50)", "Pepperoni (+$2)"] },
            { id: 3, name: "Caesar Salad", price: 9.99, img: "https://images.unsplash.com/photo-1550304943-4f24f54ddde9?w=150", modifiers: ["Grilled Chicken (+$3)", "No Dressing"] },
            { id: 4, name: "Chocolate Cake", price: 6.99, img: "https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=150", modifiers: ["With Ice Cream (+$2)"] }
        ];

        let cart = [];

        // Render menu
        function renderMenu() {
            const menuDiv = document.getElementById('menu');
            menuDiv.innerHTML = menuData.map(item => `
                <div class="menu-item">
                    <img src="${item.img}" alt="${item.name}">
                    <div class="item-info">
                        <div class="item-name">${item.name}</div>
                        <div class="item-price">$${item.price.toFixed(2)}</div>
                        <div class="modifiers">
                            ${item.modifiers.map((mod, idx) => `
                                <label><input type="checkbox" data-item="${item.id}" data-mod="${mod}"> ${mod}</label>
                            `).join('')}
                        </div>
                    </div>
                    <button class="add-btn" onclick="addToCart(${item.id})">+ Add</button>
                </div>
            `).join('');
        }

        // Add to cart
        function addToCart(itemId) {
            const item = menuData.find(i => i.id === itemId);
            const modCheckboxes = document.querySelectorAll(`input[data-item="${itemId}"]:checked`);
            const selectedMods = Array.from(modCheckboxes).map(cb => cb.getAttribute('data-mod'));
            
            const cartItem = {
                id: item.id,
                name: item.name,
                price: item.price,
                modifiers: selectedMods
            };
            cart.push(cartItem);
            updateCart();
        }

        // Update cart display
        function updateCart() {
            const cartDiv = document.getElementById('cart-items');
            let total = 0;
            cartDiv.innerHTML = cart.map((item, idx) => {
                let itemTotal = item.price;
                const modText = item.modifiers.length ? ` (${item.modifiers.join(', ')})` : '';
                // Rough modifier cost estimation for demo
                const modCost = item.modifiers.reduce((sum, m) => {
                    const match = m.match(/\+\$(\d+\.?\d*)/);
                    return sum + (match ? parseFloat(match[1]) : 0);
                }, 0);
                total += item.price + modCost;
                return `<div class="cart-item"><span>${item.name}${modText}</span><span>$${(item.price + modCost).toFixed(2)}</span></div>`;
            });
            document.getElementById('total').textContent = total.toFixed(2);
        }

        // Place order (simulated)
       function placeOrder() {
    if (cart.length === 0) {
        document.getElementById('status').textContent = '⚠️ Cart is empty!';
        document.getElementById('status').style.color = 'red';
        return;
    }

    const table = parseInt(document.getElementById('table-number').value) || 1;
    orderCounter++;
    localStorage.setItem('order_counter', String(orderCounter));

    // Calculate totals
    let orderTotal = 0;
    const orderItems = cart.map(item => {
        const modCost = item.modifiers.reduce((sum, m) => {
            const match = m.match(/\+\$(\d+\.?\d*)/);
            return sum + (match ? parseFloat(match[1]) : 0);
        }, 0);
        const total = item.price + modCost;
        orderTotal += total;
        return {
            name: item.name,
            modifiers: item.modifiers,
            total: total
        };
    });

    const orderData = {
        id: orderCounter,
        table: table,
        items: orderItems,
        total: orderTotal,
        time: new Date().toLocaleTimeString(),
        completed: false,
        timestamp: Date.now()
    };

    // ─── SAVE TO LOCALSTORAGE ───

    // Get existing orders
    let existingOrders = [];
    try {
        existingOrders = JSON.parse(localStorage.getItem('kds_orders') || '[]');
    } catch (e) {
        existingOrders = [];
    }

    // Add new order to the beginning
    existingOrders.unshift(orderData);

    // Save back to localStorage
    localStorage.setItem('kds_orders', JSON.stringify(existingOrders));

    // ─── UI FEEDBACK ───

    document.getElementById('status').textContent = `✅ Order #${orderCounter} sent to kitchen! (Table ${table})`;
    document.getElementById('status').style.color = '#27ae60';

    // Clear cart
    cart = [];
    updateCart();

    // Play confirmation sound
    try {
        const ctx = new(window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = 1047;
        osc.type = 'sine';
        gain.gain.value = 0.2;
        osc.start();
        osc.stop(ctx.currentTime + 0.15);
        setTimeout(() => {
            const osc2 = ctx.createOscillator();
            const gain2 = ctx.createGain();
            osc2.connect(gain2);
            gain2.connect(ctx.destination);
            osc2.frequency.value = 1319;
            osc2.type = 'sine';
            gain2.gain.value = 0.2;
            osc2.start();
            osc2.stop(ctx.currentTime + 0.15);
        }, 200);
    } catch (e) { /* silent */ }

    // Show browser notification
    if (Notification.permission === 'granted') {
        new Notification('🍳 New Order!', {
            body: `Order #${orderCounter} - Table ${table}`,
            icon: '🍳'
        });
    }
}

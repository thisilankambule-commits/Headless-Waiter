<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>👨‍🍳 Kitchen Display System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #1a1a2e;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            padding-bottom: 15px;
            border-bottom: 2px solid #e94560;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .header h1 {
            font-size: 28px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .badge {
            background: #e94560;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
        }

        .stats {
            display: flex;
            gap: 20px;
            font-size: 14px;
            color: #aaa;
        }

        .stats span {
            background: #16213e;
            padding: 5px 15px;
            border-radius: 15px;
        }

        .order {
            background: #16213e;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 5px solid #e94560;
            color: white;
            animation: slideIn 0.3s ease-out;
        }

        .order.completed {
            border-left-color: #2ecc71;
            opacity: 0.6;
        }

        .order.completed .order-items {
            text-decoration: line-through;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .order-number {
            font-size: 22px;
            font-weight: bold;
            color: #e94560;
        }

        .order-time {
            color: #888;
            font-size: 14px;
        }

        .order-table {
            background: #0f3460;
            padding: 2px 12px;
            border-radius: 12px;
            font-size: 14px;
        }

        .order-items {
            margin: 10px 0;
            padding-left: 10px;
        }

        .order-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            border-bottom: 1px solid #1a1a2e;
            font-size: 15px;
        }

        .order-item .mods {
            color: #f39c12;
            font-size: 13px;
            margin-left: 10px;
        }

        .order-total {
            text-align: right;
            font-size: 18px;
            font-weight: bold;
            color: #2ecc71;
            margin-top: 8px;
        }

        .order-actions {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 8px 20px;
            border: none;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .btn-ready {
            background: #2ecc71;
            color: white;
        }
        .btn-ready:hover {
            background: #27ae60;
            transform: scale(1.02);
        }

        .btn-cancel {
            background: #e74c3c;
            color: white;
        }
        .btn-cancel:hover {
            background: #c0392b;
        }

        .empty {
            text-align: center;
            color: #555;
            padding: 60px 20px;
            font-size: 18px;
        }

        .empty .emoji {
            font-size: 60px;
            display: block;
            margin-bottom: 15px;
        }

        .flash {
            animation: flash 0.5s ease 3;
        }
        @keyframes flash {
            0%,
            100% {
                background: #16213e;
            }
            50% {
                background: #e94560;
            }
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 20px;
            }
            .stats {
                font-size: 12px;
                gap: 10px;
                flex-wrap: wrap;
            }
            .order-number {
                font-size: 18px;
            }
            .order-item {
                font-size: 14px;
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>👨‍🍳 Headless Waiter <span class="badge">KDS</span></h1>
            <div class="stats">
                <span>📋 <span id="order-count">0</span> active</span>
                <span>✅ <span id="completed-count">0</span> done</span>
            </div>
        </div>

        <div id="order-list">
            <div class="empty">
                <span class="emoji">🍽️</span>
                No orders yet.<br/>
                <small style="color:#444;">Orders will appear here automatically</small>
            </div>
        </div>
    </div>

    <script>
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        // SIMPLE STORAGE - uses localStorage
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        // Get orders from localStorage
        function getOrders() {
            try {
                return JSON.parse(localStorage.getItem('kds_orders') || '[]');
            } catch (e) {
                return [];
            }
        }

        // Save orders to localStorage
        function saveOrders(orders) {
            localStorage.setItem('kds_orders', JSON.stringify(orders));
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        // RENDER ORDERS
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        function renderOrders() {
            const orders = getOrders();
            const list = document.getElementById('order-list');
            const active = orders.filter(o => !o.completed);
            const completed = orders.filter(o => o.completed);

            document.getElementById('order-count').textContent = active.length;
            document.getElementById('completed-count').textContent = completed.length;

            if (orders.length === 0) {
                list.innerHTML = `
                    <div class="empty">
                        <span class="emoji">🍽️</span>
                        No orders yet.<br/>
                        <small style="color:#444;">Orders will appear here automatically</small>
                    </div>
                `;
                return;
            }

            // Show active first, then completed
            const sorted = [...active, ...completed];

            list.innerHTML = sorted.map(order => `
                <div class="order ${order.completed ? 'completed' : ''}" data-id="${order.id}">
                    <div class="order-header">
                        <span class="order-number">#${order.id}</span>
                        <span class="order-table">Table ${order.table || '1'}</span>
                        <span class="order-time">${order.time || 'Just now'}</span>
                    </div>

                    <div class="order-items">
                        ${order.items.map(item => `
                            <div class="order-item">
                                <span>
                                    ${item.name}
                                    ${item.modifiers && item.modifiers.length ? 
                                        `<span class="mods">(${item.modifiers.join(', ')})</span>` : ''
                                    }
                                </span>
                                <span>$${item.total ? item.total.toFixed(2) : '0.00'}</span>
                            </div>
                        `).join('')}
                    </div>

                    <div class="order-total">
                        Total: $${order.total ? order.total.toFixed(2) : '0.00'}
                    </div>

                    <div class="order-actions">
                        ${!order.completed ? `
                            <button class="btn btn-ready" onclick="markReady('${order.id}')">✅ Mark Ready</button>
                            <button class="btn btn-cancel" onclick="cancelOrder('${order.id}')">❌ Cancel</button>
                        ` : `
                            <button class="btn btn-cancel" onclick="deleteOrder('${order.id}')">🗑️ Remove</button>
                        `}
                    </div>
                </div>
            `).join('');
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        // ORDER ACTIONS
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        function markReady(orderId) {
            const orders = getOrders();
            const order = orders.find(o => o.id === orderId);
            if (order) {
                order.completed = true;
                saveOrders(orders);
                renderOrders();
                playSound('ready');
            }
        }

        function cancelOrder(orderId) {
            if (confirm('Cancel this order?')) {
                let orders = getOrders();
                orders = orders.filter(o => o.id !== orderId);
                saveOrders(orders);
                renderOrders();
                playSound('cancel');
            }
        }

        function deleteOrder(orderId) {
            if (confirm('Remove this completed order?')) {
                let orders = getOrders();
                orders = orders.filter(o => o.id !== orderId);
                saveOrders(orders);
                renderOrders();
            }
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        // SOUND EFFECTS
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        function playSound(type) {
            try {
                const ctx = new(window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);

                if (type === 'new') {
                    osc.frequency.value = 880;
                    osc.type = 'sine';
                    gain.gain.value = 0.3;
                    osc.start();
                    osc.stop(ctx.currentTime + 0.2);
                    setTimeout(() => {
                        const osc2 = ctx.createOscillator();
                        const gain2 = ctx.createGain();
                        osc2.connect(gain2);
                        gain2.connect(ctx.destination);
                        osc2.frequency.value = 660;
                        osc2.type = 'sine';
                        gain2.gain.value = 0.3;
                        osc2.start();
                        osc2.stop(ctx.currentTime + 0.2);
                    }, 250);
                } else if (type === 'ready') {
                    osc.frequency.value = 523;
                    osc.type = 'sine';
                    gain.gain.value = 0.2;
                    osc.start();
                    osc.stop(ctx.currentTime + 0.3);
                } else {
                    osc.frequency.value = 300;
                    osc.type = 'sawtooth';
                    gain.gain.value = 0.15;
                    osc.start();
                    osc.stop(ctx.currentTime + 0.2);
                }
            } catch (e) {
                // Audio not supported - silently fail
            }
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        // CHECK FOR NEW ORDERS EVERY 2 SECONDS
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        let lastOrderCount = 0;

        function checkForNewOrders() {
            const orders = getOrders();
            const currentCount = orders.length;

            // If new order arrived
            if (currentCount > lastOrderCount && currentCount > 0) {
                // Check if the newest order is uncompleted
                const newest = orders[0];
                if (newest && !newest.completed) {
                    playSound('new');
                    // Flash the first order
                    setTimeout(() => {
                        const firstOrder = document.querySelector('.order');
                        if (firstOrder) {
                            firstOrder.classList.add('flash');
                            setTimeout(() => firstOrder.classList.remove('flash'), 1500);
                        }
                    }, 100);
                }
            }

            lastOrderCount = currentCount;
            renderOrders();
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        // LISTEN FOR CHANGES (across tabs)
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        window.addEventListener('storage', (e) => {
            if (e.key === 'kds_orders') {
                renderOrders();
                // Check if this was a new order
                const orders = getOrders();
                if (orders.length > 0) {
                    const newest = orders[0];
                    if (newest && !newest.completed && !newest._seen) {
                        newest._seen = true;
                        saveOrders(orders);
                        playSound('new');
                        setTimeout(() => {
                            const firstOrder = document.querySelector('.order');
                            if (firstOrder) {
                                firstOrder.classList.add('flash');
                                setTimeout(() => firstOrder.classList.remove('flash'), 1500);
                            }
                        }, 100);
                    }
                }
            }
        });

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        // INIT
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        // Initial render
        renderOrders();

        // Check for new orders every 2 seconds
        setInterval(checkForNewOrders, 2000);

        // Request notification permission
        if ('Notification' in window && Notification.permission === 'default') {
            Notification.requestPermission();
        }

        console.log('🍳 Kitchen Display System ready!');
        console.log('📋 Waiting for orders...');
        console.log('💡 Open the menu page and place an order to test.');
    </script>
</body>
</html>
